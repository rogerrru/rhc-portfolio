    <script>
      (function (l) {
        var p = l.search.slice(1).split('&');
        var path = p.find(function (s) { return s.startsWith('p='); });
        if (!path) return;
        var decoded = path.slice(2).split('~and~').join('&');
        var query = p.find(function (s) { return s.startsWith('q='); });
        var qs = query ? '?' + query.slice(2).split('~and~').join('&') : '';
        window.history.replaceState(null, null, l.pathname.replace(/\/$/, '') + decoded + qs + l.hash);
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
